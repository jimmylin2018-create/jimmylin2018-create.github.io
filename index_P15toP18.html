<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字學霸學習卡 - 第15至18頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-container { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="app" class="flex flex-col items-center p-4 sm:p-8">
        <!-- Header -->
        <header class="w-full max-w-md flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">國中基礎單字 (15-18)</h1>
            </div>
            <div class="bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-200">
                <span id="remaining-count" class="text-xs font-bold text-indigo-600">載入中...</span>
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="w-full max-w-md h-2 bg-slate-200 rounded-full mb-8 overflow-hidden">
            <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Flashcard Area -->
        <div id="card-area" class="relative w-full max-w-md perspective-1000 h-[480px]">
            <div id="card-inner" class="card-container relative w-full h-full preserve-3d cursor-pointer shadow-xl rounded-3xl">
                <!-- Front (單字面) -->
                <div class="absolute inset-0 backface-hidden bg-white rounded-3xl flex flex-col items-center justify-center p-8 border-2 border-slate-100">
                    <span class="text-slate-400 text-xs font-bold tracking-widest uppercase mb-4">Word</span>
                    <h2 id="word-front" class="text-5xl font-extrabold text-slate-800 text-center mb-6 break-all">-</h2>
                    <button id="speak-btn-front" class="p-4 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                    </button>
                    <p class="absolute bottom-10 text-slate-300 text-sm font-medium animate-pulse">點擊卡片查看解釋</p>
                </div>

                <!-- Back (解釋面) -->
                <div class="absolute inset-0 backface-hidden bg-white rounded-3xl flex flex-col p-8 border-2 border-indigo-100 rotate-y-180 overflow-hidden">
                    <div class="flex justify-between items-start mb-6 border-b border-slate-100 pb-4">
                        <div>
                            <h3 id="word-back" class="text-3xl font-bold text-indigo-600">-</h3>
                            <p id="translation-back" class="text-xl text-slate-700 font-medium mt-1">-</p>
                        </div>
                        <button id="speak-btn-back" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                        </button>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto pr-2">
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Example Sentence</span>
                            <p id="example-back" class="text-slate-700 leading-relaxed italic text-lg">"-"</p>
                            <button id="speak-example-btn" class="mt-3 text-xs text-indigo-500 font-bold hover:underline flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg> 朗讀例句
                            </button>
                        </div>
                    </div>

                    <!-- SRS 控制按鈕 -->
                    <div class="mt-6 pt-6 border-t border-slate-100 grid grid-cols-4 gap-2">
                        <button onclick="handleSRS('AGAIN')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-red-50 text-red-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-red-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                            <span class="text-[10px] font-bold text-red-500 uppercase">Again</span>
                        </button>
                        <button onclick="handleSRS('HARD')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-orange-50 text-orange-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                            <span class="text-[10px] font-bold text-orange-500 uppercase">Hard</span>
                        </button>
                        <button onclick="handleSRS('GOOD')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-green-50 text-green-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-green-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                            <span class="text-[10px] font-bold text-green-500 uppercase">Good</span>
                        </button>
                        <button onclick="handleSRS('EASY')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-indigo-50 text-indigo-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-indigo-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                            <span class="text-[10px] font-bold text-indigo-500 uppercase">Easy</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <p class="mt-8 text-slate-400 text-sm">單字範圍：gate ~ helper (第 15-18 頁)</p>

        <!-- Completion Modal -->
        <div id="completion-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-8 z-50">
            <div class="bg-white p-12 rounded-3xl shadow-2xl text-center max-w-md w-full border border-slate-100">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">學習完成！</h2>
                <p class="text-slate-600 mb-8">您已經完成了第 15-18 頁的單字內容。</p>
                <button onclick="resetSession()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                    再次複習
                </button>
            </div>
        </div>
    </div>

    <script>
        // 資料集 (第 15 頁到第 18 頁內容摘錄)
        const wordData = [
            { word: "gate", translation: "大門(n)", example: "The school gate is locked at night." },
            { word: "general", translation: "一般的、非特殊的(adj) 將軍(n)", example: "It is a matter of general interest." },
            { word: "generous", translation: "慷慨的、大方的(adj)", example: "It's very generous of you to lend me the money." },
            { word: "gentle", translation: "溫柔的、和藹的(adj)", example: "He is a gentle man." },
            { word: "gentleman", translation: "紳士(n)", example: "He is a true gentleman." },
            { word: "geography", translation: "地理(n)", example: "He is good at geography." },
            { word: "get", translation: "獲得、到達、變成(v)", example: "I got a letter from my friend today." },
            { word: "ghost", translation: "鬼(n)", example: "Do you believe in ghosts?" },
            { word: "giant", translation: "巨大的(adj) 巨人(n)", example: "The giant was very friendly." },
            { word: "gift", translation: "禮物、天賦(n)", example: "I bought a birthday gift for my mother." },
            { word: "girl", translation: "女孩(n)", example: "The girl is reading a book." },
            { word: "give", translation: "給予(v)", example: "Please give me a glass of water." },
            { word: "glad", translation: "高興的(adj)", example: "I'm glad to see you again." },
            { word: "glass", translation: "玻璃、玻璃杯(n) 眼鏡(複)", example: "The glass is full of milk." },
            { word: "glove", translation: "手套(n)", example: "I lost my left glove." },
            { word: "glue", translation: "膠水(n) 黏住(v)", example: "Use some glue to stick it together." },
            { word: "go", translation: "去、行走(v)", example: "Let's go home together." },
            { word: "goal", translation: "目標、得分(n)", example: "His goal is to become a doctor." },
            { word: "goat", translation: "山羊(n)", example: "The goat is eating grass." },
            { word: "god", translation: "神、上帝(n)", example: "Do you believe in God?" },
            { word: "gold", translation: "金、黃金(n/adj)", example: "Her ring is made of gold." },
            { word: "golden", translation: "金色的、貴重的(adj)", example: "She has golden hair." },
            { word: "golf", translation: "高爾夫球(n)", example: "He likes to play golf." },
            { word: "good", translation: "好的(adj)", example: "He is a good student." },
            { word: "good-bye", translation: "再見(int)", example: "Say good-bye to your friends." },
            { word: "goose", translation: "鵝(n)", example: "The goose is swimming in the pond." },
            { word: "government", translation: "政府(n)", example: "The government should help the poor." },
            { word: "grade", translation: "年級、成績(n)", example: "He is in the seventh grade." },
            { word: "gram", translation: "公克(n)", example: "A gram is a small unit of weight." },
            { word: "grandchild", translation: "孫子、孫女(n)", example: "They have three grandchildren." },
            { word: "granddaughter", translation: "孫女(n)", example: "My granddaughter is five years old." },
            { word: "grandfather", translation: "祖父、外祖父(n)", example: "My grandfather tells me stories." },
            { word: "grandmother", translation: "祖母、外祖母(n)", example: "My grandmother lives in the country." },
            { word: "grandson", translation: "孫子(n)", example: "He is his grandfather's grandson." },
            { word: "grape", translation: "葡萄(n)", example: "I like sweet grapes." },
            { word: "grass", translation: "草(n)", example: "Don't walk on the grass." },
            { word: "gray", translation: "灰色的(adj) 灰色(n)", example: "The sky is gray today." },
            { word: "great", translation: "偉大的、大的(adj)", example: "He is a great leader." },
            { word: "greedy", translation: "貪婪的(adj)", example: "Don't be so greedy." },
            { word: "green", translation: "綠色的(adj) 綠色(n)", example: "The leaves are green in spring." },
            { word: "greet", translation: "問候、打招呼(v)", example: "They greeted each other with a smile." },
            { word: "ground", translation: "地面(n)", example: "He sat on the ground." },
            { word: "group", translation: "群、小組(n)", example: "They are a group of students." },
            { word: "grow", translation: "生長、變成(v)", example: "Plants grow quickly in the rain." },
            { word: "guard", translation: "警衛、看守(n/v)", example: "A guard is standing at the door." },
            { word: "guess", translation: "猜測(v/n)", example: "Can you guess what's in the box?" },
            { word: "guest", translation: "客人(n)", example: "We have guests for dinner tonight." },
            { word: "guide", translation: "導遊、嚮導(n) 引導(v)", example: "The guide showed us the city." },
            { word: "guitar", translation: "吉他(n)", example: "He can play the guitar very well." },
            { word: "gun", translation: "槍(n)", example: "It is illegal to carry a gun." },
            { word: "gym", translation: "體育館(n)", example: "We play basketball in the gym." },
            { word: "habit", translation: "習慣(n)", example: "It's a good habit to get up early." },
            { word: "hair", translation: "頭髮(n)", example: "She has long black hair." },
            { word: "half", translation: "一半(n/adj/adv)", example: "Half of the apple is rotten." },
            { word: "hall", translation: "大廳、禮堂(n)", example: "We had a meeting in the hall." },
            { word: "Halloween", translation: "萬聖節前夕(n)", example: "Kids wear costumes on Halloween." },
            { word: "ham", translation: "火腿(n)", example: "I like to eat ham and eggs." },
            { word: "hamburger", translation: "漢堡(n)", example: "He ate a large hamburger." },
            { word: "hammer", translation: "鐵鎚(n/v)", example: "Use a hammer to drive the nail in." },
            { word: "hand", translation: "手(n) 交給(v)", example: "Please wash your hands." },
            { word: "handbag", translation: "手提袋(n)", example: "She carried a leather handbag." },
            { word: "handkerchief", translation: "手帕(n)", example: "He wiped his brow with a handkerchief." },
            { word: "handle", translation: "柄、把手(n) 處理(v)", example: "The handle of the cup is broken." },
            { word: "handsome", translation: "英俊的(adj)", example: "He is a handsome boy." },
            { word: "hang", translation: "懸掛(v)", example: "Hang your coat on the hook." },
            { word: "happen", translation: "發生(v)", example: "What happened to you?" },
            { word: "happy", translation: "快樂的、幸福的(adj)", example: "Happy birthday to you!" },
            { word: "hard", translation: "硬的、難的(adj) 努力地(adv)", example: "This is a hard problem." },
            { word: "hard-working", translation: "勤奮的(adj)", example: "He is a hard-working student." },
            { word: "hardly", translation: "幾乎不(adv)", example: "I can hardly hear you." },
            { word: "hat", translation: "帽子(n)", example: "He is wearing a white hat." },
            { word: "hate", translation: "憎恨、不喜歡(v/n)", example: "I hate to be late for school." },
            { word: "have", translation: "有、吃、患(病)(v)", example: "I have a new bike." },
            { word: "he", translation: "他(pron)", example: "He is my brother." },
            { word: "head", translation: "頭、首領(n)", example: "I have a headache." },
            { word: "headache", translation: "頭痛(n)", example: "The loud noise gave me a headache." },
            { word: "health", translation: "健康(n)", example: "Health is more important than wealth." },
            { word: "healthy", translation: "健康的(adj)", example: "Fresh air is healthy." },
            { word: "hear", translation: "聽見(v)", example: "Can you hear me?" },
            { word: "heart", translation: "心、心臟、核心(n)", example: "He has a kind heart." },
            { word: "heat", translation: "熱(n) 加熱(v)", example: "The heat from the sun is very strong." },
            { word: "heater", translation: "暖氣機、加熱器(n)", example: "Turn on the heater, it's cold." },
            { word: "heavy", translation: "重的(adj)", example: "The box is too heavy for me to carry." },
            { word: "height", translation: "高度(n)", example: "What is your height?" },
            { word: "helicopter", translation: "直升機(n)", example: "The helicopter landed on the roof." },
            { word: "hello", translation: "哈囉、你好(int/n)", example: "Hello, how are you today?" },
            { word: "help", translation: "幫助(v/n)", example: "Can you help me with my homework?" },
            { word: "helpful", translation: "有幫助的(adj)", example: "She is a very helpful girl." },
            { word: "helper", translation: "助手、幫手(n)", example: "He is a good helper in the kitchen." }
        ];

        let queue = [...wordData];
        let learnedCount = 0;
        let sessionTotal = wordData.length;
        let isFlipped = false;
        let isProcessing = false;

        const cardInner = document.getElementById('card-inner');
        const wordFront = document.getElementById('word-front');
        const wordBack = document.getElementById('word-back');
        const translationBack = document.getElementById('translation-back');
        const exampleBack = document.getElementById('example-back');
        const remainingCountText = document.getElementById('remaining-count');
        const progressBar = document.getElementById('progress-bar');
        const speakBtnFront = document.getElementById('speak-btn-front');
        const speakBtnBack = document.getElementById('speak-btn-back');
        const speakExampleBtn = document.getElementById('speak-example-btn');
        const modal = document.getElementById('completion-modal');

        function updateUI() {
            if (queue.length === 0) {
                modal.classList.remove('hidden');
                return;
            }
            const current = queue[0];
            wordFront.innerText = current.word;
            wordBack.innerText = current.word;
            translationBack.innerText = current.translation;
            exampleBack.innerText = current.example;
            remainingCountText.innerText = `剩餘 ${queue.length} 個`;
            const progress = (learnedCount / sessionTotal) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function toggleFlip() {
            if (isProcessing) return;
            isFlipped = !isFlipped;
            cardInner.classList.toggle('rotate-y-180', isFlipped);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        function handleSRS(type) {
            if (queue.length === 0 || isProcessing) return;
            isProcessing = true;

            const current = queue.shift();
            
            if (isFlipped) {
                isFlipped = false;
                cardInner.classList.remove('rotate-y-180');
                
                setTimeout(() => {
                    applySRSLogic(current, type);
                    updateUI();
                    isProcessing = false;
                }, 400); 
            } else {
                applySRSLogic(current, type);
                updateUI();
                isProcessing = false;
            }
        }

        function applySRSLogic(current, type) {
            switch(type) {
                case 'AGAIN': 
                    queue.splice(Math.min(3, queue.length), 0, current); 
                    break;
                case 'HARD': 
                    queue.splice(Math.floor(queue.length / 2), 0, current); 
                    break;
                case 'GOOD': 
                    queue.push(current); 
                    break;
                case 'EASY': 
                    learnedCount++; 
                    break;
            }
        }

        function resetSession() {
            queue = [...wordData];
            learnedCount = 0;
            isFlipped = false;
            isProcessing = false;
            modal.classList.add('hidden');
            cardInner.classList.remove('rotate-y-180');
            updateUI();
        }

        cardInner.addEventListener('click', toggleFlip);
        speakBtnFront.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].word); });
        speakBtnBack.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].word); });
        speakExampleBtn.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].example); });

        updateUI();
    </script>
</body>
</html>
