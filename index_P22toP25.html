<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字學霸學習卡 - 第22至25頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-container { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="app" class="flex flex-col items-center p-4 sm:p-8">
        <!-- Header -->
        <header class="w-full max-w-md flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">國中基礎單字 (22-25)</h1>
            </div>
            <div class="bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-200">
                <span id="remaining-count" class="text-xs font-bold text-indigo-600">載入中...</span>
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="w-full max-w-md h-2 bg-slate-200 rounded-full mb-8 overflow-hidden">
            <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Flashcard Area -->
        <div id="card-area" class="relative w-full max-w-md perspective-1000 h-[480px]">
            <div id="card-inner" class="card-container relative w-full h-full preserve-3d cursor-pointer shadow-xl rounded-3xl">
                <!-- Front -->
                <div class="absolute inset-0 backface-hidden bg-white rounded-3xl flex flex-col items-center justify-center p-8 border-2 border-slate-100">
                    <span class="text-slate-400 text-xs font-bold tracking-widest uppercase mb-4">Word</span>
                    <h2 id="word-front" class="text-5xl font-extrabold text-slate-800 text-center mb-6 break-all">-</h2>
                    <button id="speak-btn-front" class="p-4 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                    </button>
                    <p class="absolute bottom-10 text-slate-300 text-sm font-medium animate-pulse">點擊卡片查看解釋</p>
                </div>

                <!-- Back -->
                <div class="absolute inset-0 backface-hidden bg-white rounded-3xl flex flex-col p-8 border-2 border-indigo-100 rotate-y-180 overflow-hidden">
                    <div class="flex justify-between items-start mb-6 border-b border-slate-100 pb-4">
                        <div>
                            <h3 id="word-back" class="text-3xl font-bold text-indigo-600">-</h3>
                            <p id="translation-back" class="text-xl text-slate-700 font-medium mt-1">-</p>
                        </div>
                        <button id="speak-btn-back" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                        </button>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto pr-2">
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Example Sentence</span>
                            <p id="example-back" class="text-slate-700 leading-relaxed italic text-lg">"-"</p>
                            <button id="speak-example-btn" class="mt-3 text-xs text-indigo-500 font-bold hover:underline flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg> 朗讀例句
                            </button>
                        </div>
                    </div>

                    <!-- SRS Controls -->
                    <div class="mt-6 pt-6 border-t border-slate-100 grid grid-cols-4 gap-2">
                        <button onclick="handleSRS('AGAIN')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-red-50 text-red-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-red-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                            <span class="text-[10px] font-bold text-red-500 uppercase">Again</span>
                        </button>
                        <button onclick="handleSRS('HARD')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-orange-50 text-orange-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                            <span class="text-[10px] font-bold text-orange-500 uppercase">Hard</span>
                        </button>
                        <button onclick="handleSRS('GOOD')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-green-50 text-green-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-green-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                            <span class="text-[10px] font-bold text-green-500 uppercase">Good</span>
                        </button>
                        <button onclick="handleSRS('EASY')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-indigo-50 text-indigo-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-indigo-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                            <span class="text-[10px] font-bold text-indigo-500 uppercase">Easy</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <p class="mt-8 text-slate-400 text-sm">單字範圍：international ~ leave (第 22-25 頁)</p>

        <!-- Completion Modal -->
        <div id="completion-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-8 z-50">
            <div class="bg-white p-12 rounded-3xl shadow-2xl text-center max-w-md w-full border border-slate-100">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">學習完成！</h2>
                <p class="text-slate-600 mb-8">您已經完成了第 22-25 頁的單字內容。</p>
                <button onclick="resetSession()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                    再次複習
                </button>
            </div>
        </div>
    </div>

    <script>
        const wordData = [
            { word: "international", translation: "國際的(adj)", example: "English is an international language." },
            { word: "interrupt", translation: "打斷(v)", example: "Don't interrupt me when I'm speaking." },
            { word: "interview", translation: "面談、採訪(n/v)", example: "He had an interview for a job." },
            { word: "into", translation: "進到...之內(prep)", example: "He went into the house." },
            { word: "introduce", translation: "介紹、引進(v)", example: "Let me introduce my friend to you." },
            { word: "introduction", translation: "介紹、引進、前言(n)", example: "This is a short introduction to the book." },
            { word: "invent", translation: "發明(v)", example: "Who invented the telephone?" },
            { word: "invention", translation: "發明(n)", example: "The computer is a great invention." },
            { word: "invitation", translation: "邀請、邀請卡(n)", example: "I received an invitation to the party." },
            { word: "invite", translation: "邀請(v)", example: "They invited us to dinner." },
            { word: "iron", translation: "鐵、熨斗(n) 燙平(v)", example: "She is ironing her dress." },
            { word: "is", translation: "是(be動詞單數)(v)", example: "She is a doctor." },
            { word: "island", translation: "島、島嶼(n)", example: "Taiwan is a beautiful island." },
            { word: "it", translation: "它(pron)", example: "Give it to me." },
            { word: "its", translation: "它的(所有格)(pron)", example: "The dog wagged its tail." },
            { word: "itself", translation: "它自己(pron)", example: "The door closed by itself." },
            { word: "jacket", translation: "夾克、外套(n)", example: "He is wearing a blue jacket." },
            { word: "jam", translation: "果醬、擠滿(n/v)", example: "I like strawberry jam." },
            { word: "January", translation: "一月(n)", example: "January is the first month of the year." },
            { word: "Japan", translation: "日本(n)", example: "He wants to visit Japan." },
            { word: "Japanese", translation: "日本的(adj) 日本人、日語(n)", example: "Can you speak Japanese?" },
            { word: "jazz", translation: "爵士樂(n)", example: "She enjoys listening to jazz." },
            { word: "jeans", translation: "牛仔褲(n)", example: "He always wears blue jeans." },
            { word: "jeep", translation: "吉普車(n)", example: "They drove a jeep in the desert." },
            { word: "job", translation: "工作、職業(n)", example: "What is your father's job?" },
            { word: "jog", translation: "慢跑(v/n)", example: "I go jogging every morning." },
            { word: "join", translation: "參加、連結(v)", example: "Would you like to join us?" },
            { word: "joke", translation: "開玩笑(v) 玩笑(n)", example: "That's a funny joke." },
            { word: "journal", translation: "日報、雜誌、日記(n)", example: "She keeps a daily journal." },
            { word: "journalist", translation: "新聞工作者(n)", example: "He works as a journalist." },
            { word: "joy", translation: "歡樂、喜悅(n)", example: "Winning the game brought us joy." },
            { word: "judge", translation: "法官(n) 審判、判斷(v)", example: "You can't judge a book by its cover." },
            { word: "juice", translation: "果汁(n)", example: "I want a glass of orange juice." },
            { word: "July", translation: "七月(n)", example: "It's very hot in July." },
            { word: "jump", translation: "跳、跳躍(v/n)", example: "Can you jump over the fence?" },
            { word: "June", translation: "六月(n)", example: "They got married in June." },
            { word: "junior", translation: "年少者、等級較低者(n) 年少的(adj)", example: "He is a junior in high school." },
            { word: "junior high school", translation: "國民中學(n)", example: "My brother is in junior high school." },
            { word: "just", translation: "正、剛、只(adv)", example: "I have just finished my lunch." },
            { word: "justice", translation: "正義、公平(n)", example: "We all hope for social justice." },
            { word: "kangaroo", translation: "袋鼠(n)", example: "Kangaroos live in Australia." },
            { word: "keep", translation: "保存、保持(v)", example: "Keep the room clean." },
            { word: "ketchup", translation: "番茄醬(n)", example: "Do you like ketchup on your fries?" },
            { word: "key", translation: "鑰匙、關鍵(n)", example: "Where are my house keys?" },
            { word: "keyboard", translation: "鍵盤(n)", example: "He is typing on the keyboard." },
            { word: "kick", translation: "踢(v/n)", example: "He kicked the ball into the goal." },
            { word: "kid", translation: "小孩(n) 開玩笑(v)", example: "He's just a kid." },
            { word: "kill", translation: "殺、毀滅(v)", example: "The hunter killed a tiger." },
            { word: "kilogram", translation: "公斤(n)", example: "He lost five kilograms." },
            { word: "kilometer", translation: "公里(n)", example: "The school is one kilometer away." },
            { word: "kind", translation: "親切的(adj) 種類(n)", example: "What kind of fruit do you like?" },
            { word: "king", translation: "國王(n)", example: "The king lives in the palace." },
            { word: "kiss", translation: "吻(v/n)", example: "She gave her baby a kiss." },
            { word: "kitchen", translation: "廚房(n)", example: "Mother is cooking in the kitchen." },
            { word: "kite", translation: "風箏(n)", example: "They are flying a kite in the park." },
            { word: "kitten", translation: "小貓(n)", example: "The kitten is very cute." },
            { word: "knee", translation: "膝蓋(n)", example: "He fell and hurt his knee." },
            { word: "kneel", translation: "跪下(v)", example: "They knelt down to pray." },
            { word: "knife", translation: "刀子(n)", example: "Be careful with that sharp knife." },
            { word: "knight", translation: "騎士(n)", example: "The knight is riding a horse." },
            { word: "knock", translation: "敲(v/n)", example: "Someone is knocking at the door." },
            { word: "know", translation: "知道、認識(v)", example: "I don't know his name." },
            { word: "knowledge", translation: "知識(n)", example: "Knowledge is power." },
            { word: "Koala", translation: "無尾熊(n)", example: "Koalas eat eucalyptus leaves." },
            { word: "Korea", translation: "韓國(n)", example: "He is going to Korea next week." },
            { word: "Korean", translation: "韓國的(adj) 韓國人、韓語(n)", example: "My favorite food is Korean barbecue." },
            { word: "label", translation: "標籤(n) 貼標籤於(v)", example: "Read the label on the bottle." },
            { word: "labor", translation: "勞動、勞工(n)", example: "It took many days of hard labor." },
            { word: "lack", translation: "缺乏、不足(v/n)", example: "He lacks confidence." },
            { word: "lady", translation: "女士、淑女(n)", example: "Ladies and gentlemen, welcome!" },
            { word: "lake", translation: "湖泊(n)", example: "Sun Moon Lake is famous." },
            { word: "lamb", translation: "小羊、羊肉(n)", example: "The little lamb is following its mother." },
            { word: "lamp", translation: "燈(n)", example: "Turn on the desk lamp." },
            { word: "land", translation: "陸地(n) 登陸、著陸(v)", example: "The plane will land soon." },
            { word: "landscape", translation: "風景、景色(n)", example: "The landscape here is beautiful." },
            { word: "language", translation: "語言(n)", example: "How many languages can you speak?" },
            { word: "lantern", translation: "燈籠(n)", example: "We carry lanterns on Lantern Festival." },
            { word: "large", translation: "大的(adj)", example: "They live in a large city." },
            { word: "last", translation: "最後的(adj) 持續(v) 最後地(adv)", example: "I saw him last night." },
            { word: "late", translation: "遲的、晚的(adj/adv)", example: "Don't be late for school." },
            { word: "lately", translation: "最近地(adv)", example: "I haven't seen him lately." },
            { word: "later", translation: "較晚的(adj) 後來、稍後(adv)", example: "I'll call you later." },
            { word: "latest", translation: "最新的、最晚的(adj)", example: "Have you heard the latest news?" },
            { word: "laugh", translation: "笑(v/n)", example: "He laughed at the funny joke." },
            { word: "law", translation: "法律(n)", example: "We must obey the law." },
            { word: "lawyer", translation: "律師(n)", example: "He wants to be a lawyer." },
            { word: "lay", translation: "放置、產卵(v)", example: "Please lay the book on the table." },
            { word: "lazy", translation: "懶惰的(adj)", example: "Don't be lazy, study hard." },
            { word: "lead", translation: "領導(v) 領先(n)", example: "Follow me, I'll lead the way." },
            { word: "leader", translation: "領導者(n)", example: "He is a good leader." },
            { word: "leaf", translation: "葉子(n)", example: "The leaf turned yellow in autumn." },
            { word: "learn", translation: "學習、獲悉(v)", example: "I want to learn how to swim." },
            { word: "least", translation: "最少的(adj/adv)", example: "At least he tried his best." },
            { word: "leather", translation: "皮革(n/adj)", example: "The shoes are made of leather." },
            { word: "leave", translation: "離開、遺留(v) 准假(n)", example: "He left his umbrella on the bus." }
        ];

        let queue = [...wordData];
        let learnedCount = 0;
        let sessionTotal = wordData.length;
        let isFlipped = false;
        let isProcessing = false;

        const cardInner = document.getElementById('card-inner');
        const wordFront = document.getElementById('word-front');
        const wordBack = document.getElementById('word-back');
        const translationBack = document.getElementById('translation-back');
        const exampleBack = document.getElementById('example-back');
        const remainingCountText = document.getElementById('remaining-count');
        const progressBar = document.getElementById('progress-bar');
        const speakBtnFront = document.getElementById('speak-btn-front');
        const speakBtnBack = document.getElementById('speak-btn-back');
        const speakExampleBtn = document.getElementById('speak-example-btn');
        const modal = document.getElementById('completion-modal');

        function updateUI() {
            if (queue.length === 0) {
                modal.classList.remove('hidden');
                return;
            }
            const current = queue[0];
            wordFront.innerText = current.word;
            wordBack.innerText = current.word;
            translationBack.innerText = current.translation;
            exampleBack.innerText = current.example;
            remainingCountText.innerText = `剩餘 ${queue.length} 個`;
            const progress = (learnedCount / sessionTotal) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function toggleFlip() {
            if (isProcessing) return;
            isFlipped = !isFlipped;
            cardInner.classList.toggle('rotate-y-180', isFlipped);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        function handleSRS(type) {
            if (queue.length === 0 || isProcessing) return;
            isProcessing = true;

            const current = queue.shift();
            
            if (isFlipped) {
                isFlipped = false;
                cardInner.classList.remove('rotate-y-180');
                
                setTimeout(() => {
                    applySRSLogic(current, type);
                    updateUI();
                    isProcessing = false;
                }, 400); 
            } else {
                applySRSLogic(current, type);
                updateUI();
                isProcessing = false;
            }
        }

        function applySRSLogic(current, type) {
            switch(type) {
                case 'AGAIN': 
                    queue.splice(Math.min(3, queue.length), 0, current); 
                    break;
                case 'HARD': 
                    queue.splice(Math.floor(queue.length / 2), 0, current); 
                    break;
                case 'GOOD': 
                    queue.push(current); 
                    break;
                case 'EASY': 
                    learnedCount++; 
                    break;
            }
        }

        function resetSession() {
            queue = [...wordData];
            learnedCount = 0;
            isFlipped = false;
            isProcessing = false;
            modal.classList.add('hidden');
            cardInner.classList.remove('rotate-y-180');
            updateUI();
        }

        cardInner.addEventListener('click', toggleFlip);
        speakBtnFront.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].word); });
        speakBtnBack.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].word); });
        speakExampleBtn.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].example); });

        updateUI();
    </script>
</body>
</html>
