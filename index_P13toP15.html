<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字學霸學習卡 - 第13至15頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-container { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="app" class="flex flex-col items-center p-4 sm:p-8">
        <!-- Header -->
        <header class="w-full max-w-md flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">國中基礎單字 (13-15)</h1>
            </div>
            <div class="bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-200">
                <span id="remaining-count" class="text-xs font-bold text-indigo-600">載入中...</span>
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="w-full max-w-md h-2 bg-slate-200 rounded-full mb-8 overflow-hidden">
            <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Flashcard Area -->
        <div id="card-area" class="relative w-full max-w-md perspective-1000 h-[480px]">
            <div id="card-inner" class="card-container relative w-full h-full preserve-3d cursor-pointer shadow-xl rounded-3xl">
                <!-- Front (單字面) -->
                <div class="absolute inset-0 backface-hidden bg-white rounded-3xl flex flex-col items-center justify-center p-8 border-2 border-slate-100">
                    <span class="text-slate-400 text-xs font-bold tracking-widest uppercase mb-4">Word</span>
                    <h2 id="word-front" class="text-5xl font-extrabold text-slate-800 text-center mb-6 break-all">-</h2>
                    <button id="speak-btn-front" class="p-4 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                    </button>
                    <p class="absolute bottom-10 text-slate-300 text-sm font-medium animate-pulse">點擊卡片查看解釋</p>
                </div>

                <!-- Back (解釋面) -->
                <div class="absolute inset-0 backface-hidden bg-white rounded-3xl flex flex-col p-8 border-2 border-indigo-100 rotate-y-180 overflow-hidden">
                    <div class="flex justify-between items-start mb-6 border-b border-slate-100 pb-4">
                        <div>
                            <h3 id="word-back" class="text-3xl font-bold text-indigo-600">-</h3>
                            <p id="translation-back" class="text-xl text-slate-700 font-medium mt-1">-</p>
                        </div>
                        <button id="speak-btn-back" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                        </button>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto pr-2">
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Example Sentence</span>
                            <p id="example-back" class="text-slate-700 leading-relaxed italic text-lg">"-"</p>
                            <button id="speak-example-btn" class="mt-3 text-xs text-indigo-500 font-bold hover:underline flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg> 朗讀例句
                            </button>
                        </div>
                    </div>

                    <!-- SRS 控制按鈕 -->
                    <div class="mt-6 pt-6 border-t border-slate-100 grid grid-cols-4 gap-2">
                        <button onclick="handleSRS('AGAIN')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-red-50 text-red-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-red-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                            <span class="text-[10px] font-bold text-red-500 uppercase">Again</span>
                        </button>
                        <button onclick="handleSRS('HARD')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-orange-50 text-orange-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                            <span class="text-[10px] font-bold text-orange-500 uppercase">Hard</span>
                        </button>
                        <button onclick="handleSRS('GOOD')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-green-50 text-green-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-green-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                            <span class="text-[10px] font-bold text-green-500 uppercase">Good</span>
                        </button>
                        <button onclick="handleSRS('EASY')" class="flex flex-col items-center gap-1 group">
                            <div class="w-full bg-indigo-50 text-indigo-500 py-3 rounded-xl flex items-center justify-center group-hover:bg-indigo-500 group-hover:text-white transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                            <span class="text-[10px] font-bold text-indigo-500 uppercase">Easy</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <p class="mt-8 text-slate-400 text-sm">單字範圍：experience ~ gas (第 13-15 頁)</p>

        <!-- Completion Modal -->
        <div id="completion-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-8 z-50">
            <div class="bg-white p-12 rounded-3xl shadow-2xl text-center max-w-md w-full border border-slate-100">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">學習完成！</h2>
                <p class="text-slate-600 mb-8">您已經完成了第 13-15 頁的單字內容。</p>
                <button onclick="resetSession()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                    再次複習
                </button>
            </div>
        </div>
    </div>

    <script>
        // 資料集 (第 13 頁到第 15 頁)
        const wordData = [
            { word: "experience", translation: "經驗、經歷(n/v)", example: "He has much experience in teaching." },
            { word: "expert", translation: "專家(n) 老練的(adj)", example: "He is an expert in computer science." },
            { word: "explain", translation: "解釋(v)", example: "Could you explain this problem to me?" },
            { word: "eye", translation: "眼睛(n)", example: "She has blue eyes." },
            { word: "face", translation: "臉(n) 面向、對付(v)", example: "Wash your face before you go to bed." },

            { word: "false", translation: "錯誤的、不真實的(adj)", example: "Is the statement true or false?" },

            { word: "famous", translation: "著名的(adj)", example: "He is a famous writer." },
            { word: "fan", translation: "迷、電風扇(n)", example: "I'm a big fan of baseball." },
            { word: "fancy", translation: "別緻的、昂貴的(adj)", example: "She is wearing a fancy dress." },
            { word: "far", translation: "遠的(adj/adv)", example: "How far is it from here?" },
            { word: "farm", translation: "農場(n)", example: "They live on a farm." },
            { word: "farmer", translation: "農夫(n)", example: "The farmer is planting rice." },

            { word: "fast food", translation: "速食(n)", example: "I don't like fast food very much." },
            { word: "fat", translation: "肥胖的(adj) 脂肪(n)", example: "He is a bit fat." },

            { word: "feather", translation: "羽毛(n)", example: "A feather is very light." },
            { word: "February", translation: "二月(n)", example: "February is the second month of the year." },
            { word: "fee", translation: "費用(n)", example: "The entrance fee is ten dollars." },
            { word: "feed", translation: "餵食(v)", example: "Have you fed the dog yet?" },
            { word: "feel", translation: "感覺(v)", example: "I feel very tired today." },
            { word: "feeling", translation: "感覺、感情(n)", example: "I have a feeling that he will come." },
            { word: "fence", translation: "籬笆、柵欄(n)", example: "The garden is surrounded by a wooden fence." },
            { word: "festival", translation: "節日(n)", example: "The Dragon Boat Festival is in June." },
            { word: "fever", translation: "發燒(n)", example: "I think I have a fever." },
            { word: "few", translation: "少數、不多的(adj/pron)", example: "I have few friends here." },
            { word: "fiction", translation: "小說(n)", example: "I like reading science fiction." },
            { word: "field", translation: "原野、田地、領域(n)", example: "The sheep are grazing in the field." },
            { word: "fifteen", translation: "十五(n/adj)", example: "She is fifteen years old." },
            { word: "fifty", translation: "五十(n/adj)", example: "There are fifty students in our class." },
            { word: "fight", translation: "戰鬥、吵架(v/n)", example: "Don't fight with your classmates." },
            { word: "file", translation: "檔案(n/v)", example: "I can't find the file on my computer." },
            { word: "fill", translation: "裝滿(v)", example: "Fill the glass with water." },
            { word: "film", translation: "電影、軟片(n)", example: "I want to see that film." },
            { word: "final", translation: "最後的、期末考(adj/n)", example: "This is my final decision." },
            { word: "finally", translation: "終於(adv)", example: "Finally, the rain stopped." },
            { word: "find", translation: "尋找、發現(v)", example: "I can't find my keys." },
            { word: "fine", translation: "美好的、健康的(adj) 罰金(n/v)", example: "I'm fine, thank you." },
            { word: "finger", translation: "手指(n)", example: "She has long fingers." },
            { word: "finish", translation: "完成、結束(v/n)", example: "When will you finish your homework?" },
            { word: "fire", translation: "火、火災(n) 開槍、解僱(v)", example: "The house was on fire." },
            { word: "fireman", translation: "消防員(n)", example: "The firemen put out the fire." },
            { word: "first", translation: "第一(adj/adv/n)", example: "Who was the first person to arrive?" },
            { word: "fish", translation: "魚(n) 釣魚(v)", example: "He caught a big fish." },
            { word: "fisherman", translation: "漁夫(n)", example: "The fisherman is mending his net." },
            { word: "five", translation: "五(n/adj)", example: "I have five dollars." },
            { word: "fix", translation: "固定、修理(v)", example: "Can you fix my watch?" },
            { word: "flag", translation: "旗幟(n)", example: "The national flag is flying in the breeze." },
            { word: "flashlight", translation: "手電筒(n)", example: "I need a flashlight to see in the dark." },
            { word: "flat", translation: "平坦的(adj) 公寓(n)", example: "The earth is not flat." },
            { word: "flight", translation: "飛行、航班(n)", example: "What time is your flight?" },
            { word: "floor", translation: "地板、樓層(n)", example: "I live on the third floor." },
            { word: "flour", translation: "麵粉(n)", example: "Bread is made from flour." },
            { word: "flower", translation: "花(n)", example: "This flower smells sweet." },
            { word: "flu", translation: "流行性感冒(n)", example: "He is down with the flu." },
            { word: "flute", translation: "長笛(n)", example: "She plays the flute very well." },
            { word: "fly", translation: "飛(v) 蒼蠅(n)", example: "Birds can fly." },
            { word: "focus", translation: "焦點(n) 集中(v)", example: "You should focus on your studies." },
            { word: "fog", translation: "霧(n)", example: "The mountain was covered in thick fog." },
            { word: "foggy", translation: "有霧的(adj)", example: "It's a foggy morning." },
            { word: "follow", translation: "跟隨、遵守(v)", example: "Follow me, please." },
            { word: "food", translation: "食物(n)", example: "I like Chinese food." },
            { word: "fool", translation: "傻瓜(n) 愚弄(v)", example: "Don't be a fool." },
            { word: "foolish", translation: "愚蠢的(adj)", example: "That was a foolish mistake." },
            { word: "foot", translation: "腳(n)", example: "My left foot hurts." },
            { word: "football", translation: "足球(n)", example: "Do you like playing football?" },
            { word: "for", translation: "為了、給(prep)", example: "This gift is for you." },
            { word: "foreign", translation: "外國的(adj)", example: "He can speak three foreign languages." },
            { word: "foreigner", translation: "外國人(n)", example: "She is a foreigner from America." },
            { word: "forest", translation: "森林(n)", example: "They got lost in the forest." },
            { word: "forget", translation: "忘記(v)", example: "Don't forget to lock the door." },
            { word: "fork", translation: "叉子(n)", example: "I eat with a knife and fork." },
            { word: "form", translation: "形狀、表格(n) 形成(v)", example: "Please fill out this form." },
            { word: "former", translation: "前者、以前的(adj/n)", example: "The former plan was better." },
            { word: "forty", translation: "四十(n/adj)", example: "He is forty years old." },
            { word: "forward", translation: "向前的(adj) 向前地(adv)", example: "I'm looking forward to seeing you." },
            { word: "four", translation: "四(n/adj)", example: "A square has four sides." },
            { word: "fourteen", translation: "十四(n/adj)", example: "He is fourteen." },
            { word: "fox", translation: "狐狸(n)", example: "The fox is a clever animal." },
            { word: "frank", translation: "坦白的(adj)", example: "To be frank, I don't like the idea." },
            { word: "free", translation: "自由的、免費的(adj)", example: "The tickets are free." },
            { word: "freedom", translation: "自由(n)", example: "We all want freedom." },
            { word: "freeze", translation: "結冰、凍結(v)", example: "Water freezes at zero degrees Celsius." },
            { word: "French fries", translation: "薯條(n)", example: "I'd like a large order of French fries." },
            { word: "fresh", translation: "新鮮的(adj)", example: "These vegetables are very fresh." },
            { word: "Friday", translation: "星期五(n)", example: "Today is Friday." },
            { word: "friend", translation: "朋友(n)", example: "She is my best friend." },
            { word: "friendly", translation: "友好的(adj)", example: "He is very friendly to everyone." },
            { word: "frighten", translation: "嚇唬(v)", example: "The thunder frightened the child." },
            { word: "frog", translation: "青蛙(n)", example: "The frog jumped into the pond." },
            { word: "from", translation: "來自、從(prep)", example: "Where are you from?" },
            { word: "front", translation: "前方(n) 前方的(adj)", example: "Wait for me in front of the school." },
            { word: "fruit", translation: "水果(n)", example: "Do you like fruit?" },
            { word: "fry", translation: "油煎、油炸(v)", example: "She is frying eggs." },
            { word: "full", translation: "滿的、飽的(adj)", example: "I'm full, I can't eat anymore." },
            { word: "fun", translation: "樂趣(n) 有趣的(adj)", example: "We had a lot of fun at the party." },
            { word: "funny", translation: "有趣的、好笑的(adj)", example: "He is a very funny man." },
            { word: "furniture", translation: "家具(n)", example: "We bought some new furniture." },
            { word: "future", translation: "未來(n/adj)", example: "What do you want to be in the future?" },
            { word: "gain", translation: "獲得、增加(v/n)", example: "He gained a lot of weight." },
            { word: "game", translation: "比賽、遊戲(n)", example: "Let's play a game." },
            { word: "garage", translation: "車庫(n)", example: "Put the car in the garage." },
            { word: "garden", translation: "花園(n)", example: "The children are playing in the garden." },
            { word: "garbage", translation: "垃圾(n)", example: "Don't forget to take out the garbage." },
            { word: "gas", translation: "瓦斯、氣體、汽油(n)", example: "The car ran out of gas." }
        ];

        let queue = [...wordData];
        let learnedCount = 0;
        let sessionTotal = wordData.length;
        let isFlipped = false;
        let isProcessing = false;

        const cardInner = document.getElementById('card-inner');
        const wordFront = document.getElementById('word-front');
        const wordBack = document.getElementById('word-back');
        const translationBack = document.getElementById('translation-back');
        const exampleBack = document.getElementById('example-back');
        const remainingCountText = document.getElementById('remaining-count');
        const progressBar = document.getElementById('progress-bar');
        const speakBtnFront = document.getElementById('speak-btn-front');
        const speakBtnBack = document.getElementById('speak-btn-back');
        const speakExampleBtn = document.getElementById('speak-example-btn');
        const modal = document.getElementById('completion-modal');

        function updateUI() {
            if (queue.length === 0) {
                modal.classList.remove('hidden');
                return;
            }
            const current = queue[0];
            wordFront.innerText = current.word;
            wordBack.innerText = current.word;
            translationBack.innerText = current.translation;
            exampleBack.innerText = current.example;
            remainingCountText.innerText = `剩餘 ${queue.length} 個`;
            const progress = (learnedCount / sessionTotal) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function toggleFlip() {
            if (isProcessing) return;
            isFlipped = !isFlipped;
            cardInner.classList.toggle('rotate-y-180', isFlipped);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        function handleSRS(type) {
            if (queue.length === 0 || isProcessing) return;
            isProcessing = true;

            const current = queue.shift();
            
            if (isFlipped) {
                isFlipped = false;
                cardInner.classList.remove('rotate-y-180');
                
                setTimeout(() => {
                    applySRSLogic(current, type);
                    updateUI();
                    isProcessing = false;
                }, 400); 
            } else {
                applySRSLogic(current, type);
                updateUI();
                isProcessing = false;
            }
        }

        function applySRSLogic(current, type) {
            switch(type) {
                case 'AGAIN': 
                    queue.splice(Math.min(3, queue.length), 0, current); 
                    break;
                case 'HARD': 
                    queue.splice(Math.floor(queue.length / 2), 0, current); 
                    break;
                case 'GOOD': 
                    queue.push(current); 
                    break;
                case 'EASY': 
                    learnedCount++; 
                    break;
            }
        }

        function resetSession() {
            queue = [...wordData];
            learnedCount = 0;
            isFlipped = false;
            isProcessing = false;
            modal.classList.add('hidden');
            cardInner.classList.remove('rotate-y-180');
            updateUI();
        }

        cardInner.addEventListener('click', toggleFlip);
        speakBtnFront.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].word); });
