            { word: "driver", translation: "司機(n)", example: "The bus driver is very friendly." },
            { word: "drop", translation: "落下、滴(v/n)", example: "Be careful not to drop the glass." },

            { word: "duck", translation: "鴨(n)", example: "A family of ducks is swimming in the pond." },

            { word: "ear", translation: "耳朵(n)", example: "He whispered in my ear." },
            { word: "early", translation: "早的(adj/adv)", example: "I wake up early every morning." },
            { word: "earn", translation: "賺取(v)", example: "He earns a lot of money." },
            { word: "earring", translation: "耳環(n)", example: "She lost one of her earrings." },
            { word: "Earth", translation: "地球(n)", example: "The Earth goes around the Sun." },
            { word: "earthquake", translation: "地震(n)", example: "A big earthquake hit the city." },
            { word: "ease", translation: "安心、容易(n) 減輕(v)", example: "He finished the exam with ease." },
            { word: "east", translation: "東方(n/adj)", example: "The sun rises in the east." },
            { word: "Easter", translation: "復活節(n)", example: "Children look for eggs on Easter." },
            { word: "easy", translation: "容易的(adj)", example: "The test was very easy." },
            { word: "eat", translation: "吃(v)", example: "I'm hungry, let's eat something." },
            { word: "edge", translation: "邊緣(n)", example: "Don't stand near the edge of the cliff." },
            { word: "education", translation: "教育(n)", example: "Education is the key to success." },
            { word: "effort", translation: "努力(n)", example: "He put a lot of effort into his work." },
            { word: "egg", translation: "蛋(n)", example: "I like boiled eggs." },
            { word: "eight", translation: "八(n)", example: "The class starts at eight." },
            { word: "eighteen", translation: "十八(n)", example: "He is eighteen years old." }
        ];

        let queue = [...wordData];
        let learnedCount = 0;
        let sessionTotal = wordData.length;
        let isFlipped = false;
        let isProcessing = false; // 防止重複點擊

        const cardInner = document.getElementById('card-inner');
        const wordFront = document.getElementById('word-front');
        const wordBack = document.getElementById('word-back');
        const translationBack = document.getElementById('translation-back');
        const exampleBack = document.getElementById('example-back');
        const remainingCountText = document.getElementById('remaining-count');
        const progressBar = document.getElementById('progress-bar');
        const speakBtnFront = document.getElementById('speak-btn-front');
        const speakBtnBack = document.getElementById('speak-btn-back');
        const speakExampleBtn = document.getElementById('speak-example-btn');
        const modal = document.getElementById('completion-modal');

        function updateUI() {
            if (queue.length === 0) {
                modal.classList.remove('hidden');
                return;
            }
            const current = queue[0];
            wordFront.innerText = current.word;
            wordBack.innerText = current.word;
            translationBack.innerText = current.translation;
            exampleBack.innerText = current.example;
            remainingCountText.innerText = `剩餘 ${queue.length} 個`;
            const progress = (learnedCount / sessionTotal) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function toggleFlip() {
            if (isProcessing) return;
            isFlipped = !isFlipped;
            cardInner.classList.toggle('rotate-y-180', isFlipped);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        /**
         * 處理 SRS 按鈕點擊
         * 修改邏輯：先翻回正面，動畫結束後才更新資料
         */
        function handleSRS(type) {
            if (queue.length === 0 || isProcessing) return;
            isProcessing = true;

            const current = queue.shift();
            
            // 如果當前是翻開狀態，先翻回正面
            if (isFlipped) {
                isFlipped = false;
                cardInner.classList.remove('rotate-y-180');
                
                // 等待翻轉動畫結束 (約 400ms) 再更換內容
                setTimeout(() => {
                    applySRSLogic(current, type);
                    updateUI();
                    isProcessing = false;
                }, 400); 
            } else {
                // 如果已經在正面，直接處理
                applySRSLogic(current, type);
                updateUI();
                isProcessing = false;
            }
        }

        // 核心 SRS 排序邏輯
        function applySRSLogic(current, type) {
            switch(type) {
                case 'AGAIN': 
                    // 插回佇列前方 (大約第 3-4 個)
                    queue.splice(Math.min(3, queue.length), 0, current); 
                    break;
                case 'HARD': 
                    // 插回佇列中間
                    queue.splice(Math.floor(queue.length / 2), 0, current); 
                    break;
                case 'GOOD': 
                    // 插回佇列最後方
                    queue.push(current); 
                    break;
                case 'EASY': 
                    // 標記為已學會，不再出現
                    learnedCount++; 
                    break;
            }
        }

        function resetSession() {
            queue = [...wordData];
            learnedCount = 0;
            isFlipped = false;
            isProcessing = false;
            modal.classList.add('hidden');
            cardInner.classList.remove('rotate-y-180');
            updateUI();
        }

        // 綁定事件
        cardInner.addEventListener('click', toggleFlip);
        speakBtnFront.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].word); });
        speakBtnBack.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].word); });
        speakExampleBtn.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].example); });

        // 初始化
        updateUI();
    </script>
