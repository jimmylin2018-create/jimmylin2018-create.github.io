            { word: "cinema", translation: "電影院(n)", example: "Let's go to the cinema." },
            { word: "circle", translation: "圓圈(n)", example: "Draw a circle on the paper." },
            { word: "citizen", translation: "公民、市民(n)", example: "He is a British citizen." },
            { word: "city", translation: "城市(n)", example: "Taipei is a busy city." },
            { word: "civilized", translation: "文明的(adj)", example: "We live in a civilized society." },
            { word: "clap", translation: "拍手(v/n)", example: "Clap your hands." },
            { word: "class", translation: "班級、課(n)", example: "What time is your next class?" },
            { word: "classic", translation: "經典的(adj)", example: "I like classic movies." },
            { word: "classical", translation: "古典的(adj)", example: "She enjoys classical music." },
            { word: "classmate", translation: "同班同學(n)", example: "She is my classmate." },
            { word: "classroom", translation: "教室(n)", example: "The classroom is on the third floor." },
            { word: "clean", translation: "乾淨的(adj) 清潔(v)", example: "Keep your room clean." },
            { word: "clear", translation: "清楚的、晴朗的(adj)", example: "The sky is clear tonight." },
            { word: "clerk", translation: "辦事員、店員(n)", example: "The bank clerk helped me." },
            { word: "clever", translation: "聰明的(adj)", example: "He is a clever boy." },
            { word: "climate", translation: "氣候(n)", example: "The climate here is very hot." },
            { word: "climb", translation: "攀登、爬(v)", example: "They like to climb mountains." },
            { word: "clock", translation: "時鐘(n)", example: "The clock on the wall says 10:00." },
            { word: "close", translation: "關閉(v) 親近的(adj)", example: "He is a close friend of mine." },
            { word: "closet", translation: "壁櫥、衣櫥(n)", example: "Hang your clothes in the closet." },
            { word: "clothes", translation: "衣服(n)", example: "I need to buy some new clothes." },
            { word: "cloud", translation: "雲(n)", example: "The sun went behind a cloud." },
            { word: "cloudy", translation: "多雲的(adj)", example: "It's a cloudy day." },
            { word: "club", translation: "俱樂部、社團(n)", example: "I joined the tennis club." },
            { word: "coach", translation: "教練(n)", example: "The coach is giving instructions." },
            { word: "coast", translation: "海岸(n)", example: "We drove along the coast." },
            { word: "coat", translation: "外套、大衣(n)", example: "Put on your coat." },
            { word: "cockroach", translation: "蟑螂(n)", example: "I'm afraid of cockroaches." },
            { word: "coffee", translation: "咖啡(n)", example: "I drink coffee every morning." }
        ];

        let queue = [...wordData];
        let learnedCount = 0;
        let sessionTotal = wordData.length;
        let isFlipped = false;
        let isProcessing = false;

        const cardInner = document.getElementById('card-inner');
        const wordFront = document.getElementById('word-front');
        const wordBack = document.getElementById('word-back');
        const translationBack = document.getElementById('translation-back');
        const exampleBack = document.getElementById('example-back');
        const remainingCountText = document.getElementById('remaining-count');
        const progressBar = document.getElementById('progress-bar');
        const speakBtnFront = document.getElementById('speak-btn-front');
        const speakBtnBack = document.getElementById('speak-btn-back');
        const speakExampleBtn = document.getElementById('speak-example-btn');
        const modal = document.getElementById('completion-modal');

        function updateUI() {
            if (queue.length === 0) {
                modal.classList.remove('hidden');
                return;
            }
            const current = queue[0];
            wordFront.innerText = current.word;
            wordBack.innerText = current.word;
            translationBack.innerText = current.translation;
            exampleBack.innerText = current.example;
            remainingCountText.innerText = `剩餘 ${queue.length} 個`;
            const progress = (learnedCount / sessionTotal) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function toggleFlip() {
            if (isProcessing) return;
            isFlipped = !isFlipped;
            cardInner.classList.toggle('rotate-y-180', isFlipped);
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        function handleSRS(type) {
            if (queue.length === 0 || isProcessing) return;
            isProcessing = true;

            const current = queue.shift();
            
            // 如果當前是翻開狀態，先翻回正面
            if (isFlipped) {
                isFlipped = false;
                cardInner.classList.remove('rotate-y-180');
                
                // 等待翻轉動畫結束 (約 400ms) 再更換內容
                setTimeout(() => {
                    applySRSLogic(current, type);
                    updateUI();
                    isProcessing = false;
                }, 400); 
            } else {
                applySRSLogic(current, type);
                updateUI();
                isProcessing = false;
            }
        }

        function applySRSLogic(current, type) {
            switch(type) {
                case 'AGAIN': 
                    queue.splice(Math.min(3, queue.length), 0, current); 
                    break;
                case 'HARD': 
                    queue.splice(Math.floor(queue.length / 2), 0, current); 
                    break;
                case 'GOOD': 
                    queue.push(current); 
                    break;
                case 'EASY': 
                    learnedCount++; 
                    break;
            }
        }

        function resetSession() {
            queue = [...wordData];
            learnedCount = 0;
            isFlipped = false;
            isProcessing = false;
            modal.classList.add('hidden');
            cardInner.classList.remove('rotate-y-180');
            updateUI();
        }

        cardInner.addEventListener('click', toggleFlip);
        speakBtnFront.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].word); });
        speakBtnBack.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].word); });
        speakExampleBtn.addEventListener('click', (e) => { e.stopPropagation(); speak(queue[0].example); });

        updateUI();
    </script>
</body>
